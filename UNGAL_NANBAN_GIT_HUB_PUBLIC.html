        const CLOUDINARY_CLOUD_NAME = ""; 
        const CLOUDINARY_UPLOAD_PRESET = ""; 

        // ==========================================
        // 🚀 2. FIREBASE CONFIGURATION (For Text Data)
        // -> PASTE YOUR FIREBASE DETAILS HERE
        // ==========================================
        const firebaseConfig = {
  apiKey: "",
  authDomain: "",
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: "",
  measurementId: ""
};

        // Initialize Global Databases
        let db = null;
        let isCloudConnected = false;

        if (firebaseConfig.apiKey) {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            firebase.auth().signInAnonymously(); // Required for reading/writing safely
            isCloudConnected = true;
        }

        // Global State
        if(!localStorage.getItem('un_admin_creds')) {
            localStorage.setItem('un_admin_creds', JSON.stringify({ user: 'admin', pass: 'admin123' }));
        }

        const state = {
            lang: 'ta', theme: localStorage.getItem('un_theme') || 'light', view: 'landing', adminTab: 'Received',
            lastSubmissionId: localStorage.getItem('un_last_id') || null, lastKnownStatus: localStorage.getItem('un_last_status') || null,
            isAdminAuth: false, submissions: []
        };

        if (state.theme === 'dark') document.documentElement.classList.add('dark');

        let currentFiles = []; 
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordingStream = null;
        let recordingInterval = null;
        let recordingTimeLeft = 60;
        let currentFacingMode = 'environment'; 
        let currentAdminModeIssueId = null;
        let isSwitchingCamera = false; // Bug fix flag

        // 🚀 Cloudinary Upload Function (Background process)
        async function uploadMediaToCloudinary(fileObj) {
            if (!CLOUDINARY_CLOUD_NAME || CLOUDINARY_CLOUD_NAME === "YOUR_CLOUD_NAME") return null;

            const formData = new FormData();
            formData.append('file', fileObj.blob, fileObj.name);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

            const resourceType = fileObj.type.startsWith('video/') || fileObj.type.startsWith('audio/') ? 'video' : 'image';

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`, {
                    method: 'POST', body: formData
                });
                const data = await res.json();
                return { url: data.secure_url, type: fileObj.type, name: fileObj.name };
            } catch (err) {
                console.error("Cloudinary Upload Error:", err);
                return null;
            }
        }

        // 🚀 Firebase Real-time Global Sync
        function startGlobalSync() {
            if (!isCloudConnected) return;

            db.collection('issues').orderBy('date', 'desc').onSnapshot((snapshot) => {
                state.submissions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // Track user's specific status issue
                if (state.lastSubmissionId && !state.isAdminAuth) {
                    const myIssue = state.submissions.find(i => i.id === state.lastSubmissionId);
                    if (myIssue && myIssue.status !== state.lastKnownStatus) {
                        state.lastKnownStatus = myIssue.status;
                        localStorage.setItem('un_last_status', myIssue.status);
                        
                        showModal('custom-modal', t('popupUpdateTitle'), `${t('popupUpdateMsg')} ${t('stat' + myIssue.status) || myIssue.status}`, 'info');
                        if (state.view === 'statusCheck' && document.getElementById('status-track-id') && document.getElementById('status-track-id').value === state.lastSubmissionId) {
                            handleStatusCheck();
                        }
                    }
                }

                // Refresh UI if user is on a data page
                if (['publicIssues', 'adminDashboard', 'statusCheck'].includes(state.view)) {
                    renderView();
                }
            });
        }

        const t = (key) => i18n[state.lang][key];

        function toggleLanguage() { state.lang = state.lang === 'en' ? 'ta' : 'en'; updateStaticText(); renderView(); }
        
        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            localStorage.setItem('un_theme', state.theme);
            if (state.theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            updateStaticText();
        }

        function updateStaticText() {
            document.getElementById('app-title').innerText = t('appTitle');
            document.getElementById('app-subtitle').innerText = t('appSubtitle');
            document.getElementById('lang-btn-text').innerText = t('langToggle');
            document.getElementById('footer-text').innerText = t('footerText');
            document.getElementById('nav-home').innerText = t('navHome');
            document.getElementById('nav-about').innerText = t('navAbout');
            
            const themeIcon = document.getElementById('theme-icon');
            if(state.theme === 'dark') { themeIcon.className = 'fa-solid fa-sun text-yellow-500'; }
            else { themeIcon.className = 'fa-solid fa-moon text-gray-700'; }
            
            document.body.classList.toggle('font-tamil', state.lang === 'ta');
        }

        function navigate(view) {
            stopMediaTracks(); 
            state.view = view;
            currentFiles = [];
            renderView();
        }

        function showModal(id, title, message, type = 'info', actionsHtml = null) {
            const modal = document.getElementById(id);
            const content = document.getElementById(`${id}-content`);
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerHTML = message;
            
            if(actionsHtml) {
                document.getElementById('modal-actions').innerHTML = actionsHtml;
            } else {
                document.getElementById('modal-actions').innerHTML = `<button onclick="closeModal('${id}')" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2 px-6 rounded-lg transition">OK</button>`;
            }

            let iconHtml = '';
            if(type === 'error') iconHtml = '<div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center"><i class="fa-solid fa-circle-exclamation text-3xl text-red-500"></i></div>';
            else if (type === 'success') iconHtml = '<div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center"><i class="fa-solid fa-check text-3xl text-green-500"></i></div>';
            else iconHtml = '<div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center"><i class="fa-solid fa-bell text-3xl text-blue-500"></i></div>';
            
            document.getElementById('modal-icon-container').innerHTML = iconHtml;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            requestAnimationFrame(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); });
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            const content = document.getElementById(`${id}-content`);
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 200);
        }

        function generateTrackingId() {
            return 'UN-' + Math.random().toString(36).substr(2, 8).toUpperCase();
        }

        let activeMediaType = null;

        async function startLiveMedia(type) {
            activeMediaType = type;
            try {
                let constraints;
                if(type === 'video') constraints = { video: { facingMode: currentFacingMode }, audio: true };
                else if(type === 'audio') constraints = { audio: true };
                else constraints = { video: { facingMode: currentFacingMode } }; 

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                recordingStream = stream;
                
                document.getElementById('media-options').classList.add('hidden');
                document.getElementById('recording-ui').classList.remove('hidden');
                document.getElementById('submit-btn').disabled = true;
                
                const preview = document.getElementById('live-preview');
                const timerContainer = document.getElementById('rec-timer-container');
                const actionBtn = document.getElementById('rec-action-btn');
                const switchCamBtn = document.getElementById('switch-cam-btn');

                if(switchCamBtn) {
                    if (type === 'video' || type === 'photo') switchCamBtn.classList.remove('hidden');
                    else switchCamBtn.classList.add('hidden');
                }

                if(type === 'video' || type === 'photo') {
                    preview.srcObject = stream;
                    preview.classList.remove('hidden');
                    preview.play();
                } else preview.classList.add('hidden');

                if(type === 'photo') {
                    timerContainer.classList.add('hidden');
                    actionBtn.innerHTML = `<i class="fa-solid fa-camera"></i> ${t('btnCapture')}`;
                    actionBtn.onclick = capturePhoto;
                    actionBtn.className = "bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full flex items-center gap-2 transition";
                } else {
                    timerContainer.classList.remove('hidden');
                    actionBtn.innerHTML = `<i class="fa-solid fa-stop"></i> ${t('btnStopRec')}`;
                    actionBtn.onclick = stopRecording;
                    actionBtn.className = "bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-full flex items-center gap-2 transition pulse-recording";
                    
                    recordedChunks = [];
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = processRecording;
                    
                    mediaRecorder.start(1000); 
                    startTimer();
                }
            } catch (err) {
                console.error("Recording error:", err);
                showModal('custom-modal', t('alertError'), t('msgCamError'), 'error');
            }
        }

        async function switchCamera() {
            if(!recordingStream || activeMediaType === 'audio' || isSwitchingCamera) return;
            isSwitchingCamera = true;
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            
            try {
                const newConstraints = { video: { facingMode: currentFacingMode }, audio: activeMediaType === 'video' };
                const newStream = await navigator.mediaDevices.getUserMedia(newConstraints);
                
                if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                recordingStream.getTracks().forEach(track => track.stop());
                
                recordingStream = newStream;
                const preview = document.getElementById('live-preview');
                preview.srcObject = recordingStream;
                preview.play();

                if (activeMediaType === 'video') {
                    recordedChunks = [];
                    mediaRecorder = new MediaRecorder(recordingStream);
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = processRecording;
                    mediaRecorder.start(1000);
                }
            } catch (err) {
                currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            } finally {
                setTimeout(() => { isSwitchingCamera = false; }, 500);
            }
        }

        function capturePhoto() {
            const preview = document.getElementById('live-preview');
            const canvas = document.createElement('canvas');
            canvas.width = preview.videoWidth || 640;
            canvas.height = preview.videoHeight || 480;
            canvas.getContext('2d').drawImage(preview, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(blob => {
                if(blob) {
                    currentFiles.push({ name: `Live_Photo_${new Date().getTime()}.png`, type: 'image/png', blob: blob, size: blob.size });
                    renderFilePreviews();
                }
                cleanupRecordingUI();
            }, 'image/png');
        }

        function startTimer() {
            recordingTimeLeft = 60;
            const timerEl = document.getElementById('rec-timer');
            timerEl.innerText = `01:00`;
            recordingInterval = setInterval(() => {
                recordingTimeLeft--;
                timerEl.innerText = `00:${recordingTimeLeft.toString().padStart(2, '0')}`;
                if(recordingTimeLeft <= 0) stopRecording();
            }, 1000);
        }

        function stopRecording() {
            if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); 
            else cleanupRecordingUI();
        }
        
        function cleanupRecordingUI() {
            stopMediaTracks();
            clearInterval(recordingInterval); recordingInterval = null;
            document.getElementById('recording-ui').classList.add('hidden');
            document.getElementById('media-options').classList.remove('hidden');
            document.getElementById('live-preview').classList.add('hidden');
            document.getElementById('submit-btn').disabled = false;
        }

        function stopMediaTracks() {
            if(recordingStream) { recordingStream.getTracks().forEach(track => track.stop()); recordingStream = null; }
        }

        async function processRecording() {
            if(!recordingStream && !isSwitchingCamera) return;
            const isVideo = activeMediaType === 'video';
            if (recordedChunks.length > 0) {
                const blob = new Blob(recordedChunks, { type: isVideo ? 'video/webm' : 'audio/webm' });
                currentFiles.push({ name: `Live_${isVideo?'Video':'Audio'}_${new Date().getTime()}.${isVideo?'webm':'webm'}`, type: blob.type, blob: blob, size: blob.size });
                renderFilePreviews();
            }
            if (!isSwitchingCamera) cleanupRecordingUI();
        }

        function renderFilePreviews() {
            const container = document.getElementById('file-preview-container');
            if(!container) return;
            container.innerHTML = '';
            
            if(currentFiles.length === 0) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');
            
            currentFiles.forEach((file, index) => {
                const icon = file.type.startsWith('video') ? 'fa-video text-purple-500' : (file.type.startsWith('audio') ? 'fa-microphone text-yellow-500' : 'fa-image text-blue-500');
                
                container.innerHTML += `
                    <div class="flex items-center justify-between bg-white border border-gray-200 p-3 rounded-lg shadow-sm">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid ${icon} text-xl w-6"></i>
                            <div>
                                <p class="text-sm font-semibold truncate w-40">${file.name}</p>
                                <p class="text-xs text-gray-500">${(file.size/1024/1024).toFixed(2)} MB</p>
                            </div>
                        </div>
                        <button type="button" class="text-red-500 p-2" onclick="currentFiles.splice(${index}, 1); renderFilePreviews();">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
            });
        }

        function renderView() {
            const main = document.getElementById('main-content');
            switch(state.view) {
                case 'landing': main.innerHTML = getLandingHTML(); break;
                case 'home': main.innerHTML = getHomeHTML(); break;
                case 'about': main.innerHTML = getAboutHTML(); break;
                case 'submit': main.innerHTML = getSubmitHTML(); break;
                case 'publicIssues': main.innerHTML = getPublicIssuesHTML(); break;
                case 'statusCheck': main.innerHTML = getStatusCheckHTML(); break;
                case 'adminLogin': main.innerHTML = getAdminLoginHTML(); break;
                case 'adminDashboard': main.innerHTML = state.isAdminAuth ? getAdminDashboardHTML() : getAdminLoginHTML(); break;
            }
            updateStaticText();
        }

        async function handleSubmission(e) {
            e.preventDefault();

            if (!isCloudConnected) {
                showModal('custom-modal', t('alertError'), "Error: Firebase Database is not connected for public viewing. Please add config.", 'error');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerHTML = `<div class="loader mr-2 border-white border-t-brand-600 inline-block align-middle"></div> ${t('msgProcessing')}`;
            btn.disabled = true;

            const id = generateTrackingId();
            
            try {
                let mediaUrls = [];
                // 1. Upload media silently to Cloudinary
                if (currentFiles.length > 0) {
                    for (let f of currentFiles) {
                        const uploadedData = await uploadMediaToCloudinary(f);
                        if (uploadedData) mediaUrls.push(uploadedData);
                    }
                }

                const issue = {
                    id: id,
                    category: document.getElementById('category').value,
                    description: document.getElementById('description').value,
                    status: 'Received',
                    date: new Date().toISOString(),
                    hasMedia: mediaUrls.length > 0,
                    mediaUrls: mediaUrls
                };

                // 2. Save text and media URLs globally to Firebase Firestore
                await db.collection('issues').doc(id).set(issue);
                
                // Track locally for user status checking
                state.lastSubmissionId = id;
                state.lastKnownStatus = 'Received';
                localStorage.setItem('un_last_id', id);
                localStorage.setItem('un_last_status', 'Received');

                setTimeout(() => {
                    showModal('custom-modal', t('alertSuccess'), `${t('msgReportSubmitted')} ${id}`, 'success', 
                    `<button onclick="navigate('home'); closeModal('custom-modal');" class="bg-brand-600 text-white px-4 py-2 rounded">${t('btnHome')}</button>
                     <button onclick="navigate('statusCheck'); closeModal('custom-modal');" class="bg-gray-200 text-gray-800 px-4 py-2 rounded ml-2">${t('btnTrackStatus')}</button>`);
                }, 1000);
            } catch(error) {
                console.error("Submission error", error);
                showModal('custom-modal', t('alertError'), t('msgFailedMedia'), 'error');
            } finally {
                btn.innerHTML = t('btnSubmit');
                btn.disabled = false;
            }
        }

        function handleStatusCheck() {
            const input = document.getElementById('status-track-id').value.trim().toUpperCase();
            const issue = state.submissions.find(s => s.id === input);
            const container = document.getElementById('timeline-container');
            
            if(!issue) {
                container.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-lg text-center font-medium"><i class="fa-solid fa-circle-xmark mr-2"></i>${t('alertNotFound')}</div>`;
                container.classList.remove('hidden');
                return;
            }

            const statuses = ['Received', 'Accepted', 'Working', 'Completed'];
            const currentIndex = statuses.indexOf(issue.status);
            
            let timelineHtml = `<h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-6">${t('statusResultTitle')}</h4>`;
            
            statuses.forEach((stat, idx) => {
                const isPast = idx < currentIndex, isCurrent = idx === currentIndex, isFuture = idx > currentIndex;
                let iconStr = '', colorClass = '', bgClass = '';
                if(isPast || isCurrent) {
                    if(stat === 'Received') iconStr = 'fa-inbox';
                    if(stat === 'Accepted') iconStr = 'fa-thumbs-up';
                    if(stat === 'Working') iconStr = 'fa-person-digging';
                    if(stat === 'Completed') iconStr = 'fa-check-double';
                }
                if(isPast) { colorClass = 'text-green-600'; bgClass = 'bg-green-100'; }
                else if(isCurrent) { colorClass = 'text-brand-600'; bgClass = 'bg-brand-100 ring-4 ring-brand-50'; }
                else { colorClass = 'text-gray-300'; bgClass = 'bg-gray-100'; iconStr = 'fa-circle'; }

                timelineHtml += `
                    <div class="relative flex items-start gap-4 mb-8 timeline-step">
                        <div class="timeline-line ${isPast ? 'bg-green-400' : 'bg-gray-200'}"></div>
                        <div class="w-8 h-8 rounded-full ${bgClass} flex items-center justify-center shrink-0 z-10 shadow-sm"><i class="fa-solid ${iconStr} ${colorClass} text-sm"></i></div>
                        <div>
                            <p class="font-bold ${isCurrent ? 'text-gray-900 text-lg' : 'text-gray-600'}">${t('stat'+stat)}</p>
                            ${isCurrent ? `<p class="text-xs text-gray-500 mt-1">${t('msgStatusUpdated')}</p>` : ''}
                        </div>
                    </div>`;
            });

            container.innerHTML = timelineHtml;
            container.classList.remove('hidden');
        }

                await db.collection('issues').doc(id).update({ status: stat });

        function handleStatusChange(e, id, stat) {
            if(stat === 'Completed') {
                const issue = state.submissions.find(s => s.id === id);
                e.target.value = issue.status; 
                currentAdminModeIssueId = id;
                
                showModal('custom-modal', t('proofTitle'), t('proofDesc'), 'info', `

                </div>`);
        }

        async function executeDelete(id, isUser) {
            closeModal('custom-modal');
            if (isCloudConnected) await db.collection('issues').doc(id).delete();

            if(isUser && state.lastSubmissionId === id) {
                state.lastSubmissionId = null; state.lastKnownStatus = null;
                localStorage.removeItem('un_last_id'); localStorage.removeItem('un_last_status');
            }
            
            setTimeout(() => { showModal('custom-modal', t('alertSuccess'), t('msgDeleted'), 'success'); }, 300);
            if (isUser) { const trackIdEl = document.getElementById('status-track-id'); if (trackIdEl) trackIdEl.value = ''; const containerEl = document.getElementById('timeline-container'); if (containerEl) { containerEl.innerHTML = ''; containerEl.classList.add('hidden'); } }
        }

        async function submitAdminProof(btnElement) {
            const input = document.getElementById('admin-proof-file-input'), descInput = document.getElementById('admin-proof-desc-input');
            const files = input.files, descText = descInput.value.trim();
            
            let hasError = false;
            if(!files || files.length === 0) { input.classList.add('border-red-500', 'ring-2', 'ring-red-200'); setTimeout(() => input.classList.remove('border-red-500', 'ring-2', 'ring-red-200'), 2000); hasError = true; }
            if(descText === '') { descInput.classList.add('border-red-500', 'ring-2', 'ring-red-200'); setTimeout(() => descInput.classList.remove('border-red-500', 'ring-2', 'ring-red-200'), 2000); hasError = true; }
            if(hasError) return;
            
            btnElement.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${t('msgProcessing')}`; btnElement.disabled = true;
            
            try {
                let mediaUrls = [];
                for(let i=0; i<files.length; i++) {
                    const fileObj = { name: files[i].name, type: files[i].type, size: files[i].size, blob: files[i] };
                    const uploadedData = await uploadMediaToCloudinary(fileObj);
                    if (uploadedData) mediaUrls.push(uploadedData);
                }

                if (isCloudConnected) {
                    await db.collection('issues').doc(currentAdminModeIssueId).update({
                        status: 'Completed', adminDescription: descText, adminMediaUrls: mediaUrls
                    });
                }
                
                closeModal('custom-modal');
                setTimeout(() => { showModal('custom-modal', t('alertSuccess'), t('msgAdminCompletedSuccess'), 'success'); }, 300);
            } catch (error) {
                console.error("Admin upload failed", error);
                showModal('custom-modal', t('alertError'), t('msgSaveAdminMediaFailed'), 'error');
                btnElement.innerHTML = t('btnSubmitProof'); btnElement.disabled = false;
            }
        }

        async function viewIssueDetails(id) {
            const issue = state.submissions.find(s => s.id === id);
            if(!issue) return;
            
            let mediaHtml = `<p class="text-sm text-gray-500 italic">${t('msgNoUserMedia')}</p>`;
            
            if(issue.hasMedia && issue.mediaUrls && issue.mediaUrls.length > 0) {
                mediaHtml = '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">';
                issue.mediaUrls.forEach(f => {
                    if(f.type.startsWith('video/')) mediaHtml += `<video controls src="${f.url}" class="w-full rounded-lg border border-gray-300 bg-black"></video>`;
                    else if(f.type.startsWith('audio/')) mediaHtml += `<audio controls src="${f.url}" class="w-full mt-2"></audio>`;
                    else mediaHtml += `<img src="${f.url}" class="w-full rounded-lg border border-gray-300 object-cover h-40">`;
                });
                mediaHtml += '</div>';
            }

            let adminMediaHtml = '';
            if(issue.status === 'Completed') {
                adminMediaHtml = '<p class="text-sm font-bold text-gray-800 mt-6 mb-3 border-t border-gray-200 pt-4"><i class="fa-solid fa-shield-halved text-brand-600 mr-2"></i>'+t('adminEvidenceLabel')+'</p>';
                if(issue.adminDescription) {
                    adminMediaHtml += `<div class="mb-4 bg-green-50 border border-green-200 p-3 rounded-lg"><p class="text-xs text-green-800 uppercase mb-1 font-bold">${t('lblAdminDesc')}</p><p class="text-sm text-gray-800 whitespace-pre-wrap">${issue.adminDescription}</p></div>`;
                }

                if(issue.adminMediaUrls && issue.adminMediaUrls.length > 0) {
                    adminMediaHtml += '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">';
                    issue.adminMediaUrls.forEach(f => {
                        if(f.type.startsWith('video/')) adminMediaHtml += `<video controls src="${f.url}" class="w-full rounded-lg border border-green-300 bg-black"></video>`;
                        else if(f.type.startsWith('audio/')) adminMediaHtml += `<audio controls src="${f.url}" class="w-full mt-2"></audio>`;
                        else adminMediaHtml += `<img src="${f.url}" class="w-full rounded-lg border border-green-300 object-cover max-h-48">`;
                    });
                    adminMediaHtml += '</div>';
                }
            }

            const detailsHtml = `
                <div class="text-left max-h-[65vh] overflow-y-auto pr-2">
                    <div class="flex justify-between items-start mb-4 border-b pb-2">
                        <div><p class="text-xs text-gray-500 uppercase">${t('lblTrackId2')}</p><p class="font-mono font-bold text-lg">${issue.id}</p></div>
                        <div class="text-right"><p class="text-xs text-gray-500 uppercase">${t('lblDate')}</p><p class="font-semibold text-sm">${new Date(issue.date).toLocaleString()}</p></div>
                    </div>
                    <div class="mb-4"><p class="text-xs text-gray-500 uppercase mb-1">${t('lblCategory2')}</p><p class="font-bold text-gray-800 bg-gray-100 inline-block px-3 py-1 rounded-lg">${t('cat'+issue.category) || issue.category}</p></div>
                    <div class="mb-6"><p class="text-xs text-gray-500 uppercase mb-1">${t('lblDesc2')}</p><div class="bg-gray-50 p-3 border border-gray-200 rounded-lg text-sm text-gray-800 whitespace-pre-wrap">${issue.description}</div></div>
                    <div><p class="text-xs text-gray-500 uppercase mb-3 border-b pb-1 font-bold">${t('lblUserEvidence')}</p>${mediaHtml}</div>
                    ${adminMediaHtml}
                </div>
            `;
            
            showModal('custom-modal', t('titleIssueDetails'), '', 'info', `<button onclick="closeModal('custom-modal')" class="bg-gray-900 hover:bg-black text-white w-full py-2.5 rounded-lg font-bold transition">${t('btnCloseDetails')}</button>`);
            document.getElementById('modal-message').innerHTML = detailsHtml;
        }

        window.onload = () => {
            startGlobalSync();
            updateStaticText();
            renderView();
        };
    </script>
</body>
</html>
